version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mountly_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    networks:
      - mountly_network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: mountly_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mountly_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: mountly_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mountly_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mountly_user
      MYSQL_PASSWORD: mountly_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mountly_network

  node:
    image: node:20-alpine
    container_name: mountly_node
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - mountly_network

networks:
  mountly_network:
    driver: bridge

volumes:
  mysql_data: